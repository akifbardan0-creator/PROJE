<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* Videonun maksimum genişliği */
            padding-bottom: 56.25%; /* 16:9 oranını korur */
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://hdfilmcehennemi.mobi/video/embed/4dhOyI0yXy7/?rapidrame_id=uvvbz3v0k27l" 
            allowfullscreen="true" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
