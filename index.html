<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Log Sayfası</title>
</head>
<body>

    <h1>Log Test Sayfası</h1>
    <p>Butona basarak test et kanka.</p>
    
    <button type="button" id="testButonu">Manuel Log Gönder</button>

    <script>
        // Senin form bilgilerin
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScst0QWA97Ilvf_-FTE5uWpTjnnJsyYJhQ5_BUErmjXIuQyPw/formResponse";
        const entryID = "entry.236356235"; 

        function logGonder(mesaj) {
            const zaman = new Date().toLocaleString('tr-TR');
            const tamLog = "[" + zaman + "] -> " + mesaj;

            const formData = new FormData();
            formData.append(entryID, tamLog);

            fetch(formURL, {
                method: "POST",
                mode: "no-cors", 
                body: formData
            })
            .then(function() {
                console.log("Log başarıyla gönderildi!");
            })
            .catch(function(hata) {
                console.error("Log hatası:", hata);
            });
        }

        // Butona tıklama olayını HTML içinden değil, direkt JS içinden bağlıyoruz (Hata riskini sıfırlar)
        document.getElementById("testButonu").addEventListener("click", function() {
            logGonder("Kullanıcı butona tıkladı!");
            alert("Log gönderim isteği yapıldı, şimdi Google Formu kontrol et kanka!");
        });

        // Sayfa açıldığında otomatik gönderim
        window.onload = function() {
            logGonder("Kullanıcı web sitesine giriş yaptı.");
        };
    </script>
</body>
</html>
