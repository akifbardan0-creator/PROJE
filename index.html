<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Platformumuz</title>
    <style>
        /* Genel Sayfa Düzeni */
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000000;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #E50914; /* Netflix kırmızısı tarzı */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Reklam Alanları */
        .reklam-alani {
            background-color: #222;
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            border: 1px dashed #555;
        }

        /* Film Grid Sistemi */
        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .film-kartı {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .film-kartı:hover {
            transform: scale(1.05);
        }

        .film-resmi {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .film-adi {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        🎬 SİNEMA PLATFORMU
    </header>
